<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stockholm Bike Delivery</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="container">
    <div id="map"></div>
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- HUD -->
  <div id="hud-phase" class="phase-seeking">Phase 1: Race to the package!</div>
  <div id="hud-scores"></div>
  <div id="hud-controls">WASD / Arrow Keys to move &nbsp;·&nbsp; SPACE to steal package</div>
  <div id="hud-announcement"></div>

  <!-- Settings button + panel -->
  <button id="btn-settings" title="Settings">&#9881;</button>
  <div id="settings-panel">
    <div class="settings-title">Settings</div>
    <div class="setting-row">
      <div class="setting-label">Speed</div>
      <div class="setting-options" id="setting-speed">
        <button data-val="0.5">Slow</button>
        <button data-val="1" class="active">Normal</button>
        <button data-val="1.75">Fast</button>
        <button data-val="3">Very Fast</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Win at (pts)</div>
      <div class="setting-options" id="setting-win">
        <button data-val="50">50</button>
        <button data-val="100" class="active">100</button>
        <button data-val="200">200</button>
      </div>
    </div>
    <div class="settings-actions">
      <button id="btn-newgame-settings">New Game</button>
      <button id="btn-close-settings">Close</button>
    </div>
  </div>

  <!-- Win screen -->
  <div id="win-screen">
    <div class="win-title">Winner!</div>
    <div id="win-name"></div>
    <div class="win-score-text">reached the target score!</div>
    <button id="btn-restart">Play Again</button>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
